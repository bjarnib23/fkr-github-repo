fkr_booking.create:
  path: '/api/booking'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::store'
    _title: 'Create Booking'
  methods: [POST, OPTIONS]
  requirements:
    _access: 'TRUE'

fkr_booking.admin:
  path: '/admin/fkr-bookings'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::adminList'
    _title: 'Bókanir'
  requirements:
    _permission: 'access administration pages'

fkr_booking.stripe_checkout:
  path: '/api/gjafabref/checkout'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::stripeCheckout'
    _title: 'Stripe Checkout'
  methods: [POST, OPTIONS]
  requirements:
    _access: 'TRUE'

fkr_booking.gjafabref:
  path: '/api/gjafabref'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::gjafabref'
    _title: 'Gjafabréf'
  methods: [POST, OPTIONS]
  requirements:
    _access: 'TRUE'

fkr_booking.stripe_webhook:
  path: '/api/stripe/webhook'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::stripeWebhook'
    _title: 'Stripe Webhook'
  methods: [POST]
  requirements:
    _access: 'TRUE'

fkr_booking.gjafabref_admin:
  path: '/admin/fkr-gjafabref'
  defaults:
    _controller: '\Drupal\fkr_booking\Controller\BookingController::gjafabrefAdmin'
    _title: 'Gjafabréf pantanir'
  requirements:
    _permission: 'access administration pages'

fkr_booking.delete_booking:
  path: '/admin/fkr-bookings/{id}/delete'
  defaults:
    _form: '\Drupal\fkr_booking\Form\DeleteBookingForm'
    _title: 'Eyða bókun'
  requirements:
    _permission: 'access administration pages'
    id: \d+

fkr_booking.delete_gjafabref:
  path: '/admin/fkr-gjafabref/{id}/delete'
  defaults:
    _form: '\Drupal\fkr_booking\Form\DeleteGjafabrefForm'
    _title: 'Eyða gjafabréfspöntun'
  requirements:
    _permission: 'access administration pages'
    id: \d+
